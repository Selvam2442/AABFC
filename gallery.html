<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery - AABFC</title>
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Maximized Masonry Layout */
        .photo-grid { column-count: 1; column-gap: 20px; margin-top: 15px; width: 100%; }
        @media (min-width: 600px) { .photo-grid { column-count: 2; } }
        @media (min-width: 900px) { .photo-grid { column-count: 3; } }

        .photo-card { 
            break-inside: avoid; margin-bottom: 25px; padding: 8px; /* Reduced padding = bigger photos! */
            display: inline-block; width: 100%; text-align: center; cursor: pointer;
            background: var(--glass-bg); backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur);
            border: 1px solid var(--glass-border); border-radius: var(--border-radius-xl);
            box-shadow: var(--glass-shadow); transition: var(--transition-normal);
        }
        
        .photo-card img { 
            width: 100%; height: auto; display: block; border-radius: var(--border-radius-md); 
            margin-bottom: 10px; border: 2px solid white; box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
            transition: var(--transition-normal); 
        }
        
        .photo-card:hover { transform: translateY(-5px); border-color: var(--primary); box-shadow: 0 15px 35px rgba(212, 175, 55, 0.3); }
        .photo-card:hover img { transform: scale(1.02); border-color: var(--primary); }
        
        .photo-desc { color: var(--text-main); font-size: 14px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; padding-bottom: 5px; }

        /* Full-Screen Lightbox Styles */
        #lightbox {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0, 0, 0, 0.95); z-index: 9999;
            display: none; align-items: center; justify-content: center; flex-direction: column;
            opacity: 0; transition: opacity 0.3s ease;
        }
        #lightbox.active { display: flex; opacity: 1; }
        #lb-img { max-width: 95vw; max-height: 80vh; border-radius: 12px; box-shadow: 0 0 30px rgba(212, 175, 55, 0.4); object-fit: contain; }
        
        /* Lightbox Controls */
        .lb-close { position: absolute; top: 25px; right: 25px; color: white; font-size: 35px; cursor: pointer; transition: 0.3s; z-index: 10000; }
        .lb-close:hover { color: var(--primary); transform: scale(1.1); }
        
        .lb-nav { position: absolute; top: 50%; transform: translateY(-50%); color: white; font-size: 40px; cursor: pointer; padding: 20px; transition: 0.3s; z-index: 10000; }
        .lb-nav:hover { color: var(--primary); }
        .lb-prev { left: 10px; }
        .lb-next { right: 10px; }
        
        #lb-desc { margin-top: 20px; color: var(--primary); font-size: 18px; font-weight: 600; text-transform: uppercase; letter-spacing: 2px; text-align: center; padding: 0 20px; }

        /* Hide side arrows on small mobile screens to encourage swiping */
        @media (max-width: 600px) { .lb-nav { display: none; } }
    </style>
</head>
<body>
    <div class="header" id="main-header">
        <div class="header-top" style="margin-bottom: 0;">
            <img src="logo.png" alt="Logo" class="header-logo">
            <span>AABFC Gallery</span>
        </div>
    </div>
    
    <div class="container animate-scale slide-page">
        <div class="glass-card" style="padding: 20px; text-align: center; margin-bottom: 25px;">
            <h2 style="color: var(--accent); font-size: 20px; margin-bottom: 5px;"><i class="fa-solid fa-camera-retro"></i> Event Highlights</h2>
            <p style="color: var(--text-light); font-size: 13px;">Tap any photo to view in full screen.</p>
        </div>

        <div id="gallery-container" class="photo-grid">
            <div class="loader" style="grid-column: 1 / -1;"><i class="fa-solid fa-circle-notch fa-spin fa-2x"></i> <span style="margin-top: 10px;">Loading high-res photos...</span></div>
        </div>
    </div>

    <div id="lightbox" onclick="if(event.target.id === 'lightbox') closeLightbox()">
        <i class="fa-solid fa-xmark lb-close" onclick="closeLightbox()"></i>
        <i class="fa-solid fa-chevron-left lb-nav lb-prev" onclick="changePhoto(-1)"></i>
        <img id="lb-img" src="" alt="Full Screen Photo">
        <i class="fa-solid fa-chevron-right lb-nav lb-next" onclick="changePhoto(1)"></i>
        <p id="lb-desc"></p>
    </div>

    <a href="https://wa.me/917548822653" target="_blank" class="floating-wa"><i class="fa-brands fa-whatsapp"></i></a>

    <div class="bottom-nav">
        <a href="index.html"><i class="fa-solid fa-house"></i>Home</a>
        <a href="profiles.html"><i class="fa-solid fa-users"></i>Profiles</a>
        <a href="gallery.html" class="active"><i class="fa-solid fa-image"></i>Gallery</a>
        <a href="videos.html"><i class="fa-solid fa-play"></i>Videos</a>
    </div>

    <script>
        // Global variables for the gallery
        let galleryImages = [];
        let currentPhotoIndex = 0;
        let isLightboxOpen = false;

        // Lightbox Functions
        function openLightbox(index) {
            currentPhotoIndex = index;
            isLightboxOpen = true;
            document.getElementById('lightbox').classList.add('active');
            updateLightboxContent();
        }

        function closeLightbox() {
            isLightboxOpen = false;
            document.getElementById('lightbox').classList.remove('active');
        }

        function changePhoto(step) {
            currentPhotoIndex += step;
            // Loop around if we hit the end or beginning
            if (currentPhotoIndex < 0) currentPhotoIndex = galleryImages.length - 1;
            if (currentPhotoIndex >= galleryImages.length) currentPhotoIndex = 0;
            updateLightboxContent();
        }

        function updateLightboxContent() {
            document.getElementById('lb-img').src = galleryImages[currentPhotoIndex].img;
            document.getElementById('lb-desc').innerText = galleryImages[currentPhotoIndex].desc;
        }

        // Fetch Data from Google Script
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyfyKNm1lUecFRhi7clz4rENlfCxyDGZQDHevcXSm8e5CNE00meMk9_0Zp8n9wVkw8huw/exec"; 

        fetch(SCRIPT_URL + "?action=gallery")
            .then(response => response.json())
            .then(data => {
                const container = document.getElementById('gallery-container');
                container.innerHTML = ''; 

                if (data.error) {
                    container.innerHTML = `<div class='glass-card' style='grid-column: 1 / -1; padding:30px; text-align:center; color: var(--accent);'><p>${data.error}</p></div>`;
                    return;
                }

                if (data.images && data.images.length > 0) {
                    galleryImages = data.images; // Save to global array
                    data.images.forEach((photo, index) => {
                        // Notice the onclick event added to the card
                        container.innerHTML += `
                            <div class="photo-card animate-up" onclick="openLightbox(${index})">
                                <img src="${photo.img}" alt="${photo.desc}" loading="lazy">
                                <p class="photo-desc">${photo.desc}</p>
                            </div>
                        `;
                    });
                } else {
                    container.innerHTML = "<div class='glass-card' style='grid-column: 1 / -1; padding:30px; text-align:center; color: var(--text-light);'><p>No photos found in the Gallery folder.</p></div>";
                }
            })
            .catch(error => {
                document.getElementById('gallery-container').innerHTML = "<div class='glass-card' style='grid-column: 1 / -1; padding:30px; text-align:center; color: var(--accent);'><i class='fa-solid fa-triangle-exclamation fa-2x'></i><p style='margin-top:10px;'>Secure sync failed. Check connection.</p></div>";
            });

        // Smart Swipe Logic
        document.addEventListener('DOMContentLoaded', () => {
            window.addEventListener('scroll', function() {
                const header = document.getElementById('main-header');
                if (window.scrollY > 50) { header.classList.add('scrolled'); } 
                else { header.classList.remove('scrolled'); }
            });

            // Variables for page swiping
            let pageTouchStartX = 0, pageTouchEndX = 0;
            const pages = ['index.html', 'profiles.html', 'gallery.html', 'videos.html'];
            let currentPage = window.location.pathname.split('/').pop().split('?')[0];
            if (!currentPage || currentPage === '') currentPage = 'index.html';
            let currentIndex = pages.indexOf(currentPage);

            // Variable for lightbox swiping
            let lbTouchStartX = 0, lbTouchEndX = 0;
            const lightbox = document.getElementById('lightbox');

            // 1. PAGE SWIPE LISTENER
            document.addEventListener('touchstart', e => { pageTouchStartX = e.changedTouches[0].screenX; }, {passive: true});
            document.addEventListener('touchend', e => { 
                // CRITICAL: If the lightbox is open, DO NOT change the page!
                if (isLightboxOpen) return; 

                pageTouchEndX = e.changedTouches[0].screenX; 
                if (currentIndex === -1) return; 
                let diff = pageTouchStartX - pageTouchEndX;
                if (diff > 75 && currentIndex < pages.length - 1) window.location.href = pages[currentIndex + 1]; 
                else if (diff < -75 && currentIndex > 0) window.location.href = pages[currentIndex - 1]; 
            }, {passive: true});

            // 2. LIGHTBOX PHOTO SWIPE LISTENER
            lightbox.addEventListener('touchstart', e => { lbTouchStartX = e.changedTouches[0].screenX; }, {passive: true});
            lightbox.addEventListener('touchend', e => { 
                if (!isLightboxOpen) return;
                lbTouchEndX = e.changedTouches[0].screenX; 
                let diff = lbTouchStartX - lbTouchEndX;
                
                // Swipe Left -> Next Photo
                if (diff > 50) changePhoto(1); 
                // Swipe Right -> Previous Photo
                else if (diff < -50) changePhoto(-1); 
            }, {passive: true});
        });
    </script>
</body>
</html>
