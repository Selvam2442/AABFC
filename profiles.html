<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profiles</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="header">Student Roster</div>
    
    <div class="container animate-up slide-page">
        <div class="profile-grid">
            
            <a href="profile.html?student=Selvam" class="profile-card">
                <div class="profile-avatar">👨‍🎨</div>
                <h3>Selvam</h3>
                <p style="font-size: 12px; color: #7f8c8d; margin-top: 5px;">Artist & Achiever</p>
            </a>

            <a href="profile.html?student=Antony" class="profile-card">
                <div class="profile-avatar">👨‍💻</div>
                <h3>Antony</h3>
                <p style="font-size: 12px; color: #7f8c8d; margin-top: 5px;">Web Developer</p>
            </a>

            </div>
    </div>

    <div class="bottom-nav">
        <a href="index.html"><i>🏠</i>Home</a>
        <a href="profiles.html" class="active"><i>👥</i>Profiles</a>
        <a href="videos.html"><i>▶️</i>Videos</a>
    </div>

    <script>
        let touchstartX = 0;
        let touchendX = 0;
        const pages = ['index.html', 'profiles.html', 'videos.html'];
        let currentPage = window.location.pathname.split('/').pop() || 'index.html';
        let currentIndex = pages.indexOf(currentPage);

        function handleSwipe() {
            if (touchendX < touchstartX - 75 && currentIndex < pages.length - 1) window.location.href = pages[currentIndex + 1];
            if (touchendX > touchstartX + 75 && currentIndex > 0) window.location.href = pages[currentIndex - 1];
        }

        document.addEventListener('touchstart', e => touchstartX = e.changedTouches[0].screenX);
        document.addEventListener('touchend', e => { touchendX = e.changedTouches[0].screenX; handleSwipe(); });
    </script>
</body>
</html>
