<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profiles</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="header">Student Roster</div>
    
    <div class="container animate-up slide-page">
        <div class="profile-grid">
            
            <a href="Selvam.html" class="profile-card">
                <div class="profile-avatar">👨‍🎨</div>
                <h3>Selvam</h3>
                <p style="font-size: 12px; color: #7f8c8d; margin-top: 5px;">Artist & Achiever</p>
            </a>

            </div>
    </div>

    <div class="bottom-nav">
        <a href="index.html"><i>🏠</i>Home</a>
        <a href="profiles.html" class="active"><i>👥</i>Profiles</a>
        <a href="videos.html"><i>▶️</i>Videos</a>
    </div>

    <script>
        let touchstartX = 0;
        let touchendX = 0;
        
        // Define the exact order of your tabs
        const pages = ['index.html', 'profiles.html', 'videos.html'];
        
        // Find out which page we are currently on
        let currentPage = window.location.pathname.split('/').pop();
        if (currentPage === '' || !pages.includes(currentPage)) {
            currentPage = 'index.html'; // Default to home if not found
        }
        
        let currentIndex = pages.indexOf(currentPage);

        function handleSwipe() {
            // Swipe Left <- (Go to Next Tab)
            if (touchendX < touchstartX - 75) {
                if (currentIndex < pages.length - 1) {
                    window.location.href = pages[currentIndex + 1];
                }
            }
            // Swipe Right -> (Go to Previous Tab)
            if (touchendX > touchstartX + 75) {
                if (currentIndex > 0) {
                    window.location.href = pages[currentIndex - 1];
                }
            }
        }

        // Listen for finger touching the screen
        document.addEventListener('touchstart', e => {
            touchstartX = e.changedTouches[0].screenX;
        });

        // Listen for finger leaving the screen
        document.addEventListener('touchend', e => {
            touchendX = e.changedTouches[0].screenX;
            handleSwipe();
        });
    </script>
</body>
</html>
