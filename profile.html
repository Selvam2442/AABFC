<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Profile - AABFC</title>
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="header" id="main-header">
        <div class="header-top" style="margin-bottom: 0;">
            <img src="logo.png" alt="Logo" class="header-logo">
            <span id="header-title">Loading Portfolio...</span>
        </div>
    </div>
    
    <div class="container animate-scale slide-page">
        <div style="text-align: center; margin-bottom: 20px;">
            <div class="profile-avatar" style="width: 100px; height: 100px;">
                <img id="dynamic-avatar" src="" alt="Profile">
            </div>
            <h2 id="student-name" style="color: var(--accent);">Loading...</h2>
            <p style="color: var(--text-light); font-size: 13px; margin-top: 5px;">Tap any image to view in full screen.</p>
        </div>
        
        <div class="tabs">
            <button class="tab-btn active" onclick="openTab('paintings')"><i class="fa-solid fa-palette"></i> Artworks</button>
            <button class="tab-btn" onclick="openTab('achievements')"><i class="fa-solid fa-award"></i> Achievements</button>
        </div>

        <div id="paintings" class="tab-content glass-card active">
            <div id="paintings-container" class="photo-grid">
                <div class="loader" style="grid-column: 1 / -1;"><i class="fa-solid fa-circle-notch fa-spin fa-2x"></i> <span style="margin-top: 10px;">Loading portfolio...</span></div>
            </div>
        </div>

        <div id="achievements" class="tab-content glass-card">
            <div id="achievements-container" class="photo-grid">
                <div class="loader" style="grid-column: 1 / -1;"><i class="fa-solid fa-circle-notch fa-spin fa-2x"></i> <span style="margin-top: 10px;">Loading records...</span></div>
            </div>
        </div>

        <a href="profiles.html" class="btn" style="background: white; color: var(--accent); border: 2px solid var(--accent); box-shadow: none; margin-top: 35px;"><i class="fa-solid fa-arrow-left"></i> Back to Roster</a>
    </div>

    <div id="lightbox" onclick="if(event.target.id === 'lightbox') closeLightbox()">
        <div class="lb-close" onclick="closeLightbox()"><i class="fa-solid fa-xmark"></i></div>
        <div class="lb-nav lb-prev" onclick="changePhoto(-1)"><i class="fa-solid fa-chevron-left"></i></div>
        <img id="lb-img" src="" alt="Full Screen Photo">
        <div class="lb-nav lb-next" onclick="changePhoto(1)"><i class="fa-solid fa-chevron-right"></i></div>
        <p id="lb-desc"></p>
    </div>

    <a href="https://wa.me/917548822653" target="_blank" class="floating-wa"><i class="fa-brands fa-whatsapp"></i></a>

    <div class="bottom-nav">
        <a href="index.html"><i class="fa-solid fa-house"></i>Home</a>
        <a href="profiles.html" class="active"><i class="fa-solid fa-users"></i>Profiles</a>
        <a href="gallery.html"><i class="fa-solid fa-image"></i>Gallery</a>
        <a href="videos.html"><i class="fa-solid fa-play"></i>Videos</a>
    </div>

    <script>
        // Tab switching logic
        function openTab(tabName) {
            let tabcontent = document.getElementsByClassName("tab-content");
            for (let i = 0; i < tabcontent.length; i++) tabcontent[i].classList.remove("active");
            let tablinks = document.getElementsByClassName("tab-btn");
            for (let i = 0; i < tablinks.length; i++) tablinks[i].classList.remove("active");
            document.getElementById(tabName).classList.add("active");
            event.currentTarget.classList.add("active");
        }

        // Profile Loading Setup
        const urlParams = new URLSearchParams(window.location.search);
        const studentName = urlParams.get('student') || 'Student';

        document.getElementById('student-name').innerText = studentName;
        document.getElementById('header-title').innerText = studentName + " Portfolio";
        document.title = studentName + " - AABFC";
        document.getElementById('dynamic-avatar').src = `https://ui-avatars.com/api/?name=${studentName}&background=8B0000&color=fff&size=256`;

        // ==========================================
        // LIGHTBOX LOGIC FOR PROFILE PICTURES
        // ==========================================
        let paintingsData = [];
        let achievementsData = [];
        let currentLightboxData = [];
        let currentPhotoIndex = 0;
        let isLightboxOpen = false;

        function openLightbox(type, index) {
            // Figure out if they clicked a painting or achievement
            currentLightboxData = type === 'paintings' ? paintingsData : achievementsData;
            currentPhotoIndex = index;
            isLightboxOpen = true;
            
            const lb = document.getElementById('lightbox');
            lb.classList.add('active');
            updateLightboxContent('scale(0.9)'); 
        }

        function closeLightbox() {
            isLightboxOpen = false;
            document.getElementById('lightbox').classList.remove('active');
        }

        function changePhoto(step) {
            currentPhotoIndex += step;
            if (currentPhotoIndex < 0) currentPhotoIndex = currentLightboxData.length - 1;
            if (currentPhotoIndex >= currentLightboxData.length) currentPhotoIndex = 0;
            
            let transformDir = step > 0 ? 'translateX(30px)' : 'translateX(-30px)';
            updateLightboxContent(transformDir);
        }

        function updateLightboxContent(transformStart = 'scale(0.9)') {
            const img = document.getElementById('lb-img');
            img.style.transform = transformStart;
            img.style.opacity = '0';
            
            setTimeout(() => {
                img.src = currentLightboxData[currentPhotoIndex].img;
                document.getElementById('lb-desc').innerText = currentLightboxData[currentPhotoIndex].desc;
                img.style.transform = 'translateX(0) scale(1)';
                img.style.opacity = '1';
            }, 50);
        }

        // ==========================================
        // FETCH DATA FROM GOOGLE DRIVE
        // ==========================================
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyfyKNm1lUecFRhi7clz4rENlfCxyDGZQDHevcXSm8e5CNE00meMk9_0Zp8n9wVkw8huw/exec"; 

        fetch(SCRIPT_URL + "?name=" + studentName)
            .then(response => response.json())
            .then(data => {
                const paintContainer = document.getElementById('paintings-container');
                const achiContainer = document.getElementById('achievements-container');
                paintContainer.innerHTML = ''; achiContainer.innerHTML = '';

                if(data.error) {
                    paintContainer.innerHTML = `<p style='grid-column: 1 / -1; text-align:center; color:red;'>Directory for ${studentName} not found.</p>`;
                    achiContainer.innerHTML = `<p style='grid-column: 1 / -1; text-align:center; color:red;'>Directory for ${studentName} not found.</p>`;
                    return;
                }

                // Process Paintings
                if (data.paintings && data.paintings.length > 0) {
                    paintingsData = data.paintings; // Save to array for Lightbox
                    data.paintings.forEach((item, index) => { 
                        paintContainer.innerHTML += `
                            <div class="photo-card animate-up" onclick="openLightbox('paintings', ${index})">
                                <img src="${item.img}" alt="Artwork" loading="lazy">
                                <p class="photo-desc">${item.desc}</p>
                            </div>
                        `; 
                    });
                } else { 
                    paintContainer.innerHTML = "<p style='grid-column: 1 / -1; text-align:center; color: var(--text-light); padding: 20px;'>No artworks found.</p>"; 
                }

                // Process Achievements
                if (data.achievements && data.achievements.length > 0) {
                    achievementsData = data.achievements; // Save to array for Lightbox
                    data.achievements.forEach((item, index) => { 
                        achiContainer.innerHTML += `
                            <div class="photo-card animate-up" onclick="openLightbox('achievements', ${index})">
                                <img src="${item.img}" alt="Certificate" loading="lazy">
                                <p class="photo-desc">${item.desc}</p>
                            </div>
                        `; 
                    });
                } else { 
                    achiContainer.innerHTML = "<p style='grid-column: 1 / -1; text-align:center; color: var(--text-light); padding: 20px;'>No records found.</p>"; 
                }
            })
            .catch(error => {
                document.getElementById('paintings-container').innerHTML = "<p style='grid-column: 1 / -1; text-align:center; color:red;'>Connection error.</p>";
                document.getElementById('achievements-container').innerHTML = "<p style='grid-column: 1 / -1; text-align:center; color:red;'>Connection error.</p>";
            });

        // App-Level Interactions (Header Scroll & Lightbox Swipes)
        document.addEventListener('DOMContentLoaded', () => {
            window.addEventListener('scroll', function() {
                const header = document.getElementById('main-header');
                if (window.scrollY > 50) header.classList.add('scrolled'); 
                else header.classList.remove('scrolled');
            });

            const lightbox = document.getElementById('lightbox');
            let lbTouchStartX = 0, lbTouchEndX = 0;

            // Swiping on Mobile Lightbox
            lightbox.addEventListener('touchstart', e => { lbTouchStartX = e.changedTouches[0].screenX; }, {passive: true});
            lightbox.addEventListener('touchend', e => { 
                if (!isLightboxOpen) return;
                lbTouchEndX = e.changedTouches[0].screenX; 
                let diff = lbTouchStartX - lbTouchEndX;
                if (diff > 50) changePhoto(1); 
                else if (diff < -50) changePhoto(-1); 
            }, {passive: true});

            // PC Keyboard Navigation
            document.addEventListener('keydown', (e) => {
                if (!isLightboxOpen) return;
                if (e.key === 'ArrowRight') changePhoto(1);
                else if (e.key === 'ArrowLeft') changePhoto(-1);
                else if (e.key === 'Escape') closeLightbox();
            });
        });
    </script>
</body>
</html>
