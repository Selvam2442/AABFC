<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media Gallery</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="header">Media Gallery</div>
    
    <div class="container animate-scale slide-page">
        <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; background: var(--card-bg); padding: 15px; border-radius: var(--border-radius-lg); box-shadow: var(--shadow-md);">
            <div style="display: flex; align-items: center; gap: 15px;">
                <div class="profile-avatar" style="width: 50px; height: 50px; margin: 0;">
                    <img src="https://ui-avatars.com/api/?name=Alphonsa&background=ff0000&color=fff" alt="Channel">
                </div>
                <h3 id="channel-name" style="font-size: 16px; color: var(--text-main);">Retrieving Data...</h3>
            </div>
            <a href="https://youtube.com/@alphonsaa3118" target="_blank" style="background: #e62117; color: white; padding: 10px 20px; border-radius: 25px; text-decoration: none; font-size: 14px; font-weight: bold; box-shadow: 0 4px 10px rgba(230,33,23,0.3); transition: var(--transition-normal);"><i class="fa-brands fa-youtube"></i> Subscribe</a>
        </div>

        <div id="video-container" class="video-grid">
            <div class="loader"><i class="fa-solid fa-circle-notch fa-spin"></i> Syncing media feed...</div>
        </div>
    </div>

    <div class="bottom-nav">
        <a href="index.html"><i class="fa-solid fa-house"></i>Home</a>
        <a href="profiles.html"><i class="fa-solid fa-users"></i>Profiles</a>
        <a href="videos.html" class="active"><i class="fa-solid fa-play"></i>Videos</a>
    </div>

    <script>
        const YOUTUBE_CHANNEL_ID = "UCDspH0ysu97UO4dmJ8wNcMw"; 
        const rssUrl = encodeURIComponent(`https://www.youtube.com/feeds/videos.xml?channel_id=${YOUTUBE_CHANNEL_ID}`);
        const apiUrl = `https://api.rss2json.com/v1/api.json?rss_url=${rssUrl}`;

        fetch(apiUrl)
            .then(response => response.json())
            .then(data => {
                const container = document.getElementById('video-container');
                container.innerHTML = ''; 

                if (data.status === 'ok') {
                    document.getElementById('channel-name').innerText = data.feed.title;
                    data.items.forEach(video => {
                        container.innerHTML += `
                            <a href="${video.link}" target="_blank" style="text-decoration: none; display: block;" class="animate-up">
                                <div class="video-card">
                                    <div class="video-wrapper" style="background-image: url('${video.thumbnail}'); background-size: cover; background-position: center;">
                                        <div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(230, 33, 23, 0.9); width: 60px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 10px rgba(0,0,0,0.3);">
                                            <i class="fa-solid fa-play" style="color: white; font-size: 18px;"></i>
                                        </div>
                                    </div>
                                    <div class="video-info">
                                        <h4 style="font-size: 16px; margin-bottom: 5px; color: var(--text-main); line-height: 1.3;">${video.title}</h4>
                                        <p style="font-size: 12px; color: var(--text-light);"><i class="fa-regular fa-calendar"></i> ${video.pubDate.split(' ')[0]}</p>
                                    </div>
                                </div>
                            </a>
                        `;
                    });
                } else {
                    container.innerHTML = "<p style='text-align:center; color: var(--text-light);'>No media available.</p>";
                }
            })
            .catch(error => {
                document.getElementById('video-container').innerHTML = "<p style='text-align:center; color:red;'>Sync error.</p>";
            });
    </script>
</body>
</html>
