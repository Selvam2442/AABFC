<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Videos - AABFC</title>
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="header">
        <div class="header-top" style="margin-bottom: 0;">
            <img src="logo.png" alt="Logo" class="header-logo">
            <span>AABFC Media Vault</span>
        </div>
    </div>
    
    <div class="container animate-scale slide-page">
        <div class="glass-card" style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 25px; padding: 15px 20px;">
            <div style="display: flex; align-items: center; gap: 15px;">
                <div class="profile-avatar" style="width: 50px; height: 50px; margin: 0; border-color: var(--primary);">
                    <img src="https://ui-avatars.com/api/?name=AABFC&background=D4AF37&color=fff" alt="Channel">
                </div>
                <h3 id="channel-name" style="font-size: 16px; color: var(--accent);">Retrieving Data...</h3>
            </div>
            <a href="https://youtube.com/@alphonsaa3118" target="_blank" style="background: linear-gradient(135deg, #e62117, #a0100a); color: white; padding: 10px 20px; border-radius: 25px; text-decoration: none; font-size: 14px; font-weight: bold; box-shadow: 0 8px 15px rgba(230,33,23,0.3); transition: var(--transition-normal); border: 2px solid white;"><i class="fa-brands fa-youtube"></i> Subscribe</a>
        </div>

        <div id="video-container" class="video-grid">
            <div class="loader"><i class="fa-solid fa-circle-notch fa-spin fa-2x"></i> <span style="margin-top: 10px;">Syncing media feed...</span></div>
        </div>
    </div>

    <a href="https://wa.me/917548822653" target="_blank" class="floating-wa"><i class="fa-brands fa-whatsapp"></i></a>

    <div class="bottom-nav">
        <a href="index.html"><i class="fa-solid fa-house"></i>Home</a>
        <a href="profiles.html"><i class="fa-solid fa-users"></i>Profiles</a>
        <a href="gallery.html"><i class="fa-solid fa-image"></i>Gallery</a>
        <a href="videos.html" class="active"><i class="fa-solid fa-play"></i>Videos</a>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // GITHUB BULLETPROOF SWIPE
            let touchstartX = 0, touchendX = 0;
            const pages = ['index.html', 'profiles.html', 'gallery.html', 'videos.html'];
            
            let currentPage = window.location.pathname.split('/').pop().split('?')[0];
            if (!pages.includes(currentPage)) { currentPage = 'index.html'; }
            let currentIndex = pages.indexOf(currentPage);

            document.addEventListener('touchstart', e => { touchstartX = e.changedTouches[0].screenX; }, {passive: true});
            document.addEventListener('touchend', e => { 
                touchendX = e.changedTouches[0].screenX; 
                if (currentIndex === -1) return; 
                let diff = touchstartX - touchendX;
                if (diff > 75 && currentIndex < pages.length - 1) window.location.href = pages[currentIndex + 1]; 
                else if (diff < -75 && currentIndex > 0) window.location.href = pages[currentIndex - 1]; 
            }, {passive: true});
        });

        const YOUTUBE_CHANNEL_ID = "UCDspH0ysu97UO4dmJ8wNcMw"; 
        const rssUrl = encodeURIComponent(`https://www.youtube.com/feeds/videos.xml?channel_id=${YOUTUBE_CHANNEL_ID}`);
        const apiUrl = `https://api.rss2json.com/v1/api.json?rss_url=${rssUrl}`;

        fetch(apiUrl)
            .then(response => response.json())
            .then(data => {
                const container = document.getElementById('video-container');
                container.innerHTML = ''; 

                if (data.status === 'ok') {
                    document.getElementById('channel-name').innerText = data.feed.title || 'AABFC Official';
                    data.items.forEach(video => {
                        const videoId = video.link.split('v=')[1];
                        container.innerHTML += `
                            <a href="${video.link}" target="_blank" style="text-decoration: none; display: block;" class="animate-up">
                                <div class="glass-card video-card">
                                    <div class="video-wrapper" style="background-image: url('${video.thumbnail}'); background-size: cover; background-position: center;">
                                        <div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(230, 33, 23, 0.95); width: 65px; height: 45px; border-radius: 12px; display: flex; align-items: center; justify-content: center; box-shadow: 0 5px 15px rgba(0,0,0,0.4); border: 2px solid white; transition: 0.3s;">
                                            <i class="fa-solid fa-play" style="color: white; font-size: 20px; margin-left: 3px;"></i>
                                        </div>
                                    </div>
                                    <div class="video-info">
                                        <h4 style="font-size: 16px; margin-bottom: 8px; color: var(--text-main); line-height: 1.4;">${video.title}</h4>
                                        <p style="font-size: 12px; color: var(--accent);"><i class="fa-regular fa-calendar"></i> ${video.pubDate.split(' ')[0]}</p>
                                    </div>
                                </div>
                            </a>
                        `;
                    });
                } else {
                    container.innerHTML = "<p style='text-align:center; color: var(--text-light); padding: 30px;'>No media available right now.</p>";
                }
            })
            .catch(error => {
                document.getElementById('video-container').innerHTML = "<div class='glass-card' style='padding:30px; text-align:center; color: var(--accent);'><i class='fa-solid fa-triangle-exclamation fa-2x'></i><p style='margin-top:10px;'>Secure sync failed. Check connection.</p></div>";
            });
    </script>
</body>
</html>
