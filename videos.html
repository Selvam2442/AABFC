<!DOCTYPE html>
<html lang="en">

<body>

            <h3>@alphonsaa3118</h3>
            <a href="https://youtube.com/@alphonsaa3118" target="_blank" style="background: #ff0000; color: white; padding: 8px 15px; border-radius: 20px; text-decoration: none; font-size: 14px; font-weight: bold; box-shadow: 0 4px 10px rgba(255,0,0,0.3);">Subscribe</a>
        </div>

        <div class="video-grid">
            
            <div class="video-card">
                <div class="video-wrapper">
                    <iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ" allowfullscreen></iframe>
                </div>
                <div class="video-info">
                    <h4>Video Title 1</h4>
                    <p style="font-size: 12px; color: #7f8c8d;">Watch our latest content</p>
                </div>
            </div>

            <div class="video-card">
                <div class="video-wrapper">
                    <iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ" allowfullscreen></iframe>
                </div>
                <div class="video-info">
                    <h4>Video Title 2</h4>
                    <p style="font-size: 12px; color: #7f8c8d;">Watch our latest content</p>
                </div>
            </div>

             </div>
    </div>

    <div class="bottom-nav">
        <a href="index.html"><i>🏠</i>Home</a>
        <a href="profiles.html"><i>👥</i>Profiles</a>
        <a href="videos.html" class="active"><i>▶️</i>Videos</a>
    </div>

    <script>
        let touchstartX = 0;
        let touchendX = 0;
        
        // Define the exact order of your tabs
        const pages = ['index.html', 'profiles.html', 'videos.html'];
        
        // Find out which page we are currently on
        let currentPage = window.location.pathname.split('/').pop();
        if (currentPage === '' || !pages.includes(currentPage)) {
            currentPage = 'index.html'; // Default to home if not found
        }
        
        let currentIndex = pages.indexOf(currentPage);

        function handleSwipe() {
            // Swipe Left <- (Go to Next Tab)
            if (touchendX < touchstartX - 75) {
                if (currentIndex < pages.length - 1) {
                    window.location.href = pages[currentIndex + 1];
                }
            }
            // Swipe Right -> (Go to Previous Tab)
            if (touchendX > touchstartX + 75) {
                if (currentIndex > 0) {
                    window.location.href = pages[currentIndex - 1];
                }
            }
        }

        // Listen for finger touching the screen
        document.addEventListener('touchstart', e => {
            touchstartX = e.changedTouches[0].screenX;
        });

        // Listen for finger leaving the screen
        document.addEventListener('touchend', e => {
            touchendX = e.changedTouches[0].screenX;
            handleSwipe();
        });
    </script>
</body>
</html>
