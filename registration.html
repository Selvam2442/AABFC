<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="header">Registration</div>
    
    <div class="container animate-scale slide-page">
        <div class="form-card">
            <h3 style="margin-bottom: 25px; text-align: center; color: var(--text-main);">Enter Details</h3>
            
            <div class="form-group">
                <input type="text" id="name" placeholder="Full Name (Required)" required>
                <i class="fa-solid fa-user input-icon"></i>
            </div>
            <div class="form-group">
                <input type="number" id="age" placeholder="Age (Required)" required>
                <i class="fa-solid fa-calendar input-icon"></i>
            </div>
            <div class="form-group">
                <input type="text" id="class" placeholder="Class (Required)" required>
                <i class="fa-solid fa-graduation-cap input-icon"></i>
            </div>
            <div class="form-group">
                <input type="tel" id="phone" placeholder="Phone Number (Required)" required>
                <i class="fa-solid fa-phone input-icon"></i>
            </div>
            <div class="form-group">
                <input type="email" id="email" placeholder="Email Address (Optional)">
                <i class="fa-solid fa-envelope input-icon"></i>
            </div>
            
            <button class="btn" onclick="sendToWhatsApp()"><i class="fa-brands fa-whatsapp"></i> Submit Registration</button>
            <a href="index.html" style="display:block; text-align:center; margin-top:20px; color:var(--text-light); text-decoration: none; font-weight: 600;"><i class="fa-solid fa-arrow-left"></i> Return Home</a>
        </div>
    </div>

    <script>
        function sendToWhatsApp() {
            let name = document.getElementById('name').value;
            let age = document.getElementById('age').value;
            let studentClass = document.getElementById('class').value;
            let phone = document.getElementById('phone').value;
            let email = document.getElementById('email').value;

            if(!name || !age || !studentClass || !phone) {
                alert("Please complete all required fields.");
                return;
            }

            let message = `*New Registration Application*\n\n*Name:* ${name}\n*Age:* ${age}\n*Class:* ${studentClass}\n*Phone:* ${phone}\n*Email:* ${email ? email : 'Not provided'}`;
            let whatsappUrl = `https://wa.me/916380466535?text=${encodeURIComponent(message)}`;
            window.open(whatsappUrl, '_blank');
        }
    </script>
</body>
</html>
