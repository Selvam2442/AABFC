<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selvam's Profile</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="header">Selvam's Portfolio</div>
    
    <div class="container animate-scale slide-page">
        <div style="text-align: center; margin-bottom: 20px;">
            <div class="profile-avatar" style="width: 100px; height: 100px; font-size: 40px;">👨‍🎨</div>
            <h2>Selvam</h2>
        </div>
        
        <div class="tabs">
            <button class="tab-btn active" onclick="openTab('paintings')">🎨 Paintings</button>
            <button class="tab-btn" onclick="openTab('achievements')">🏆 Achievements</button>
        </div>

        <div id="paintings" class="tab-content active">
            <h3 style="margin-bottom: 10px;">My Artworks</h3>
            <div style="background: #f4f7f6; padding: 40px; text-align: center; border-radius: 12px; border: 2px dashed #ccc;">
                <p>🖼️ <i>Insert your painting images here</i></p>
            </div>
        </div>

        <div id="achievements" class="tab-content">
            <h3 style="margin-bottom: 10px;">Certificates</h3>
            <div style="background: #f4f7f6; padding: 40px; text-align: center; border-radius: 12px; border: 2px dashed #ccc;">
                <p>📜 <i>Insert your certificate images here</i></p>
            </div>
        </div>

        <a href="profiles.html" class="btn" style="background: #95a5a6; margin-top: 20px;">🔙 Back to Profiles</a>
    </div>

    <script>
        function openTab(tabName) {
            let i, tabcontent, tablinks;
            tabcontent = document.getElementsByClassName("tab-content");
            for (i = 0; i < tabcontent.length; i++) {
                tabcontent[i].classList.remove("active");
            }
            tablinks = document.getElementsByClassName("tab-btn");
            for (i = 0; i < tablinks.length; i++) {
                tablinks[i].classList.remove("active");
            }
            document.getElementById(tabName).classList.add("active");
            event.currentTarget.classList.add("active");
        }
    </script>

    <script>
        let touchstartX = 0;
        let touchendX = 0;
        
        // Define the exact order of your tabs
        const pages = ['index.html', 'profiles.html', 'videos.html'];
        
        // Find out which page we are currently on
        let currentPage = window.location.pathname.split('/').pop();
        if (currentPage === '' || !pages.includes(currentPage)) {
            currentPage = 'index.html'; // Default to home if not found
        }
        
        let currentIndex = pages.indexOf(currentPage);

        function handleSwipe() {
            // Swipe Left <- (Go to Next Tab)
            if (touchendX < touchstartX - 75) {
                if (currentIndex < pages.length - 1) {
                    window.location.href = pages[currentIndex + 1];
                }
            }
            // Swipe Right -> (Go to Previous Tab)
            if (touchendX > touchstartX + 75) {
                if (currentIndex > 0) {
                    window.location.href = pages[currentIndex - 1];
                }
            }
        }

        // Listen for finger touching the screen
        document.addEventListener('touchstart', e => {
            touchstartX = e.changedTouches[0].screenX;
        });

        // Listen for finger leaving the screen
        document.addEventListener('touchend', e => {
            touchendX = e.changedTouches[0].screenX;
            handleSwipe();
        });
    </script>
</body>
</html>
